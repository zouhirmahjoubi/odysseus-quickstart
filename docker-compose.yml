version: '3.8'

services:
  pocketbase:
    build:
      context: ./apps/pocketbase
      dockerfile: Dockerfile
    volumes:
      - pocketbase_data:/pb/pb_data
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-your-secure-encryption-key-here}
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    volumes:
      - api_data:/app/data
    environment:
      - PORT=3001
      - SQLITE_DB_PATH=/app/data/sqlite.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-char-encryption-key-here}
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@odysseusai.com}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
    depends_on:
      - pocketbase
    restart: always

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/hcgi/api}
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-/hcgi/platform}
    expose:
      - "80"
    depends_on:
      - api
      - pocketbase
    restart: always

volumes:
  pocketbase_data:
  api_data:
