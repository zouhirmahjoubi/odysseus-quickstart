version: '3.8'

services:
  pocketbase:
    build:
      context: ./apps/pocketbase
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-your-secure-encryption-key-here}
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3080}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-32-char-encryption-key-here}
      - PB_SUPERUSER_EMAIL=${PB_SUPERUSER_EMAIL:-admin@odysseusai.com}
      - PB_SUPERUSER_PASSWORD=${PB_SUPERUSER_PASSWORD}
    depends_on:
      - pocketbase
    restart: always

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/hcgi/api}
        - VITE_POCKETBASE_URL=${VITE_POCKETBASE_URL:-/hcgi/platform}
    ports:
      - "3080:80"
    depends_on:
      - api
      - pocketbase
    restart: always

volumes:
  pocketbase_data:
