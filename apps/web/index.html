					<section>
						<h2>Welcome to the Odysseus AI Setup Hub</h2>
						<p>OdysseusAI.ai is a comprehensive independent orchestration directory and installation reference.</p>
						<p>Odysseus AI functions as a self-hosted workspace cockpit interface that connects to your local machine resources.</p>
						<p>It is not a standalone AI model engine itself.</p>
						<p>The standard system relies on three core orchestration layers:</p>
						<ul>
							<li><strong>Frontend Cockpit</strong> &mdash; A responsive interface running on port 7000.</li>
							<li><strong>Express API Service</strong> &mdash; Orchestrates backend requests and handles workflows.</li>
							<li><strong>PocketBase Database</strong> &mdash; Stores configuration files, auth schemas, and user data.</li>
						</ul>
						<p>Our Docker Guide and companion PewDiePie Install checklist walk you through initializing the local repository.</p>
						<p>They help you manage local system dependencies and resolve common environment variable issues.</p>
						<p>Deploying local AI allows complete data isolation.</p>
						<p>This prevents telemetry leaks and ensures sensitive files remain secure on your own local hardware setups.</p>
					</section>

					<section>
						<h2>Docker Container Environment Orchestration</h2>
						<p>Using containers is the most reliable way to run the local workspace.</p>
						<p>This Docker Guide explains how to launch and configure the monorepo application using Docker Compose networks.</p>
						<p>For details, refer to the <a href="https://docs.docker.com/get-started/" rel="noopener">Docker Documentation</a>.</p>
						<p>The standard deployment architecture isolates individual services into separate containers.</p>
						<p>These include the web client Nginx server, the Express API routing backend, and the PocketBase database platform.</p>
						<p>The container network supports a variety of local services:</p>
						<ul>
							<li><strong>ChromaDB Vector Store</strong> &mdash; Enables offline semantic index matching.</li>
							<li><strong>SearXNG Search Engine</strong> &mdash; Connects the model to real-time search pages.</li>
							<li><strong>Ollama Base Engine</strong> &mdash; Runs quantized GGUF weights locally.</li>
						</ul>
						<p>Setting up Docker requires configuring the environment file (.env) with valid keys.</p>
						<p>It also requires binding container network ports securely and mounting external Docker volumes.</p>
						<p>This ensures that user settings, data collections, and auth tables persist across system reboots.</p>
						<ul>
							<li><a href="/odysseus-install/docker">Docker Container Environment Configuration</a></li>
							<li><a href="/odysseus-install/ollama">Ollama Base URL Endpoint Mapping Matrix</a></li>
						</ul>
					</section>

					<section>
						<h2>Windows Native Setup and CUDA GPU Acceleration</h2>
						<p>For developers running on Windows 10 or 11, running natively outside of container virtual layers yields maximum execution speed.</p>
						<p>This is achieved by talking directly to graphics processing unit (GPU) drivers.</p>
						<p>Native setup on Windows requires the following tools:</p>
						<ul>
							<li><strong>Git for Windows</strong> &mdash; Clones repository branches and submodules.</li>
							<li><strong>Python 3.11+</strong> &mdash; Runs backend scripts and workspace packages.</li>
							<li><strong>NVIDIA CUDA Toolkit 12.1+</strong> &mdash; Grants GPU acceleration to PyTorch.</li>
						</ul>
						<p>For CUDA downloads, visit the <a href="https://developer.nvidia.com/cuda-downloads" rel="noopener">NVIDIA CUDA Toolkit Download Page</a>.</p>
						<p>This ensures that PyTorch and local model engines can tap into the tensor cores of NVIDIA RTX cards.</p>
						<p>Refer to the <a href="https://pytorch.org/get-started/locally/" rel="noopener">PyTorch Local Installation Guide</a> for setup steps.</p>
						<p>Once the prerequisites are met, developers can run our PowerShell installer script to check hardware configurations.</p>
						<p>This script checks workspace dependencies and verifies directory pathways automatically.</p>
						<ul>
							<li><a href="/odysseus-install/windows">Windows Native Setup & CUDA GPU Acceleration</a></li>
							<li><a href="/odysseus-fix">Common Installation Failure Index</a></li>
						</ul>
					</section>

					<section>
						<h2>macOS Metal Framework Local Acceleration Guide</h2>
						<p>Apple Silicon hardware features unified memory architectures that offer massive VRAM capacity.</p>
						<p>Bypassing container networks on macOS is highly recommended to leverage the unified memory pool.</p>
						<p>To run on Apple Silicon Macs, ensure you have:</p>
						<ul>
							<li><strong>Xcode Command Line Tools</strong> &mdash; Provides compiling wheels.</li>
							<li><strong>Homebrew Package Manager</strong> &mdash; Installs system dependencies.</li>
							<li><strong>Metal Performance Shaders (MPS)</strong> &mdash; Enables GPU-accelerated matrix operations.</li>
						</ul>
						<p>For reference documentation, see the <a href="https://developer.apple.com/metal/" rel="noopener">Apple Metal Framework Developer Portal</a>.</p>
						<p>Our macOS guide outlines step-by-step instructions to compile local wheel files.</p>
						<p>It also walks you through verifying Python pathings and mapping unified memory boundaries.</p>
						<ul>
							<li><a href="/odysseus-install/macbook">macOS Metal Framework Local Acceleration Guide</a></li>
							<li><a href="/odysseus-resources">Download Reference Manuals</a></li>
						</ul>
					</section>

					<section>
						<h2>Ollama Endpoint Mapping and Model Configuration</h2>
						<p>Connecting the dashboard to a model runner like Ollama is the core step in achieving a functional workspace.</p>
						<p>Connecting the cockpit dashboard to Ollama requires:</p>
						<ul>
							<li><strong>Host IP Mapping</strong> &mdash; Using <code>host.docker.internal</code> instead of <code>localhost</code>.</li>
							<li><strong>Port Configuration</strong> &mdash; Exposing port <code>11434</code> on the host system.</li>
							<li><strong>Model Pulling</strong> &mdash; Downloading models like Llama-3 or Mistral.</li>
						</ul>
						<p>Learn more at the <a href="https://ollama.com/" rel="noopener">Ollama Official Website</a>.</p>
						<p>When the workspace cockpit runs inside a Docker container, it cannot reach the host machine's loopback address directly.</p>
						<p>This is because containers use an isolated bridge network.</p>
						<p>To map the Ollama base URL, you must change the endpoint address from localhost to the host gateway IP.</p>
						<p>Once mapped, Odysseus AI can pull available local GGUF models, query embeddings, and manage system prompts securely.</p>
						<ul>
							<li><a href="/odysseus-blog/odysseus-ai-local-install-tutorial">Step-by-Step Installation Masterclass</a></li>
							<li><a href="/odysseus-blog/run-deepseek-coder-locally-ollama">DeepSeek Coder Integration Blueprints</a></li>
						</ul>
					</section>

					<section>
						<h2>Troubleshooting Port Conflicts and Authentication Failures</h2>
						<p>Most setup blockages stem from port conflicts or database migration issues.</p>
						<p>Typical troubleshooting points include:</p>
						<ul>
							<li><strong>Port 7000 Conflicts</strong> &mdash; Often occupied by macOS AirPlay.</li>
							<li><strong>Database Lockouts</strong> &mdash; Handled via Better Auth SQLite migrations.</li>
							<li><strong>Volume Permissions</strong> &mdash; Occurs during Docker directory mounts.</li>
						</ul>
						<p>By default, Odysseus AI binds the web cockpit dashboard to port 7000.</p>
						<p>If port 7000 is occupied by another local service, you must rebind the port in the docker-compose or environment file.</p>
						<p>Furthermore, the first login requires a secure SQLite database connection initialized via Better Auth migrations.</p>
						<p>If the dashboard displays login errors, our Triage Wizard provides immediate solutions.</p>
						<p>It helps you rebuild database tables, verify network sockets, and inspect volume access parameters.</p>
						<ul>

					<section>
						<h2>Frequently Asked Questions</h2>
						<h3>Does Odysseus AI require an internet connection?</h3>
						<p>No, when paired with local runners like Ollama, Llama.cpp, or LM Studio, Odysseus AI operates completely offline.</p>
						<p>This ensures that your data, prompts, and code never leave your machine.</p>
						<h3>What is the minimum GPU requirement for local LLMs?</h3>
						<p>We recommend a minimum of 8GB of VRAM to run quantized 7B models comfortably.</p>
						<p>For larger models, a minimum of 16GB or 24GB of VRAM is recommended.</p>
						<p>Use our VRAM calculator page to check your hardware profile.</p>
						<h3>How do I update the Odysseus AI container files?</h3>
						<p>To update to the latest release, navigate to your local repository directory and execute a git pull command.</p>
						<p>The command is: git pull origin main.</p>
						<p>Then, rebuild the container network using: docker compose up -d --build.</p>
